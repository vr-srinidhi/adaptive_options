services:
  db:
    image: postgres:15-alpine
    container_name: adaptive_options_db
    environment:
      POSTGRES_DB: adaptive_options
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: adaptive_options_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/adaptive_options
      ZERODHA_API_KEY: ${ZERODHA_API_KEY}
      ZERODHA_API_SECRET: ${ZERODHA_API_SECRET}
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_IN_PRODUCTION_USE_OPENSSL_RAND}
      BROKER_TOKEN_ENCRYPTION_KEY: ${BROKER_TOKEN_ENCRYPTION_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATA_SOURCE_PATH: ${DATA_SOURCE_PATH:-/data/historical}
    volumes:
      - ${LOCAL_DATA_PATH:-/tmp/no-data}:/data/historical:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: adaptive_options_ui
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:

server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend.
    # BACKEND_URL is substituted at container startup via envsubst.
    # Local Docker Compose: BACKEND_URL=http://backend:8000 (default)
    # Railway: BACKEND_URL=http://adaptiveoptions.railway.internal:8000 (private networking)
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

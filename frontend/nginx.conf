server {
    # $PORT is substituted at container start via envsubst (defaults to 80).
    # Railway injects $PORT; local Docker Compose leaves it unset → 80.
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (used in local Docker Compose only).
    # In Railway, VITE_API_URL points directly to the backend public URL
    # so this block is never reached.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all client-side routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to backend (used in local Docker Compose only).
    # In Railway, VITE_API_URL points directly to the backend public URL
    # so this block is never reached.
    # resolver + variable forces lazy DNS resolution so nginx doesn't crash
    # at startup when "backend" is not resolvable (e.g. in Railway).
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
